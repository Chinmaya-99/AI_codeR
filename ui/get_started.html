<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Space+Grotesk:wght@400;500&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#141313",
                        "surface-tint": "#c6c6c7",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-container": "#201f1f",
                        "surface-container-highest": "#353434",
                        "on-surface": "#e5e2e1",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-on-surface": "#313030",
                        "on-secondary": "#313030",
                        "surface-dim": "#141313",
                        "on-tertiary-container": "#636565",
                        "inverse-primary": "#5d5f5f",
                        "primary-fixed": "#e2e2e2",
                        "on-primary": "#2f3131",
                        "on-error": "#690005",
                        "outline": "#8e9192",
                        "secondary": "#c8c6c5",
                        "outline-variant": "#444748",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-secondary-container": "#bab8b7",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#e2e2e2",
                        "primary-fixed-dim": "#c6c6c7",
                        "primary-container": "#e2e2e2",
                        "primary": "#ffffff",
                        "on-tertiary": "#2f3131",
                        "on-primary-fixed-variant": "#454747",
                        "error": "#ffb4ab",
                        "on-primary-container": "#636565",
                        "error-container": "#93000a",
                        "surface-bright": "#3a3939",
                        "on-tertiary-fixed-variant": "#454747",
                        "tertiary-container": "#e2e2e2",
                        "secondary-container": "#4a4949",
                        "on-surface-variant": "#c4c7c8",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-fixed": "#1a1c1c",
                        "tertiary": "#ffffff",
                        "background": "#141313",
                        "surface-variant": "#353434",
                        "on-background": "#e5e2e1",
                        "secondary-fixed": "#e5e2e1",
                        "tertiary-fixed-dim": "#c6c6c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "80px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "xs": "8px",
                        "sm": "12px",
                        "md": "24px",
                        "base": "4px",
                        "lg": "48px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "h2": ["Inter"],
                        "label-sm": ["Inter"],
                        "h1": ["Inter"],
                        "display": ["Inter"],
                        "code": ["Space Grotesk"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "code": ["14px", { "lineHeight": "1.7", "fontWeight": "400" }],
                        "body-md": ["15px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>

</head>

<body>
<header style="background-color: black;">

    <div class="absolute inset-0 z-0">
        
        <!-- IMAGE -->
        <img src="file_00000000f32c7208bc91db1389d521f7.png" class="absolute inset-0 w-full h-full object-cover">
    </div>
    <div class="container relative z-10 flex flex-col items-center gap-8 py-20 px-10">

        <!-- 1. SOURCE CODE BOX -->
        <div id="sourceInput" class="input-div darken-glass-card text-white w-full max-w-4xl h-64"
            contenteditable="true">
            Source code...
        </div>

        <!-- 2. PROMPT BOX (The trigger) -->
        <div class="w-full max-w-5xl relative group">
            <!-- The Input Box -->
            <div id="promptInput" class="darken-glass-card text-white w-full h-32 p-6 pr-64 outline-none"
                contenteditable="true">Type your prompt...</div>

            <!-- Action Bar (Dropdown + Submit) -->
            <div class="absolute bottom-3 right-3 flex items-center gap-2">
                <select id="presetSelect"
                    class="w-40 bg-black text-white/60 border border-white/10 rounded-lg p-2 text-xs backdrop-blur-md outline-none cursor-pointer hover:bg-white/10 transition-all">
                    <option value="">Presets...</option>
                    <option value="Optimize this code for speed">🚀 Optimize Speed</option>
                    <option value="Fix all bugs and errors">🐛 Fix Bugs</option>
                    <option value="Add detailed comments">📝 Add Comments</option>
                    <option value="Refactor to clean code">✨ Refactor</option>
                </select>

                <button id="submitBtn"
                    class="bg-black hover:bg-white/20 text-white p-2 rounded-lg transition-all flex items-center justify-center">
                    <span class="material-symbols-outlined text-sm">send</span>
                </button>
            </div>
        </div>


        <!-- 3. RESULTS SECTION (Hidden initially) -->
        <div id="resultSection" class="hidden w-full max-w-6xl grid grid-cols-2 gap-6">
            <div id="outputBox" class="darken-glass-card h-96 p-4 text-white" contenteditable="true">
                Generated code...
            </div>
            <div id="detailsBox" class="normal-glass-card h-96 p-4 text-white">
                <h3 class="font-bold border-b border-white/10 mb-2">Details</h3>
                <div id="detailsContent">Analyzing...</div>
            </div>
        </div>

    </div>

</header>
</body>
